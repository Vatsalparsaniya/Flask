<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success Page</title>
</head>
<body>
    <h1>Hello, you got success
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category,message in messages %}
                <h1>with category : {{category}}</h1>
                <h1>{{ message }}</h1>
              {% endfor %}
            {% endif %}
          {% endwith %}
          {% block body %}{% endblock %}
    </h1>
</body>
</html>
