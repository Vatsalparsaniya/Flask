<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ name }}</title>
</head>
<body>
<p>hello {{ name }}, this is dynamic name by rander_tamplate </p>
<h1>your score is {{ marks }} :</h1>
{% if  marks > 50 %}
    <h1>you are pass with {{ marks }}</h1>
    <h1>subjects {{ result }}</h1>
{% else %}
    <h1>you are fail with {{ marks }}</h1>
{% endif %}

<table border="1">
         {% for key,value in result.items() %}
            <tr>
               <th> {{ key }} </th>
               <td> {{ value }} </td>
            </tr>
         {% endfor %}
</table>
</body>
</html>
